<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plaid Room Records — Print Labels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; font-family: -apple-system, sans-serif; padding: 24px; }
    h1 { font-size: 18px; margin-bottom: 8px; }
    #status { font-size: 13px; margin-bottom: 8px; color: #333; }
    #status.error { color: red; }
    #status.ok { color: #007155; }
    #cert-help {
      display: none; font-size: 13px; margin-bottom: 16px;
      background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 10px 14px;
      line-height: 1.8;
    }
    #cert-help a { color: #007155; font-weight: 600; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; margin-top: 12px; }
    select { padding: 8px 12px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; background: white; }
    button { padding: 10px 20px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    #print-btn { background: #000; color: #fff; }
    #print-btn:disabled { background: #999; cursor: not-allowed; }
    .label-item {
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 10px;
      padding: 8px 12px;
    }
    .label-item .meta { font-size: 12px; color: #555; margin-bottom: 6px; }
    .label-item .meta strong { color: #000; font-size: 13px; }
    .label-preview { line-height: 0; margin-top: 4px; }
    .label-preview img { border: 1px solid #eee; max-width: 100%; }
    .label-preview .pending { font-size: 12px; color: #999; font-style: italic; line-height: 1.4; }
  </style>
</head>
<body>
<h1>Plaid Room Records — Label Printer</h1>
<div id="status">Connecting to DYMO service…</div>
<div id="cert-help">
  ⚠️ Cannot reach the DYMO service. Make sure:<br>
  1. <strong>DYMO Connect</strong> is installed and open<br>
  2. Your LabelWriter is plugged in via USB<br>
  3. If on a new computer, <a href="http://127.0.0.1:41951" target="_blank">click here</a> to confirm the service is running
</div>
<div class="controls">
  <select id="printer-select"><option>Loading printers…</option></select>
  <button id="print-btn" disabled>Print All Labels</button>
</div>
<div id="label-list"></div>

<script>
const DYMO_HOST = 'http://127.0.0.1:41951';
const DEBUG = new URLSearchParams(window.location.search).has('debug');
const statusEl = document.getElementById('status');
const certHelp = document.getElementById('cert-help');
const printerSelect = document.getElementById('printer-select');
const printBtn = document.getElementById('print-btn');

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dbg(...args) { if (DEBUG) console.log('[label-printer]', ...args); }

const params = new URLSearchParams(window.location.search);
let items = [];
try { items = JSON.parse(decodeURIComponent(params.get('labels') || '[]')); } catch(e) {}

// Render placeholder label cards (previews filled in after DYMO loads)
const listEl = document.getElementById('label-list');
listEl.innerHTML = items.map((item, i) => `
  <div class="label-item" id="card-${i}">
    <div class="meta"><strong>${esc(item.title)}</strong> &nbsp;·&nbsp; ${esc(item.sku)} &nbsp;·&nbsp; ${esc(item.price)}</div>
    <div class="label-preview" id="preview-${i}"><span class="pending">Loading preview…</span></div>
  </div>`).join('');

function setLabelField(xml, fieldName, value) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  for (const obj of doc.querySelectorAll('ObjectInfo')) {
    const nameEl = obj.querySelector('Name');
    if (!nameEl || nameEl.textContent !== fieldName) continue;
    const textEl = obj.querySelector('BarcodeObject > Text');
    if (textEl) { textEl.textContent = value; continue; }
    const strEl = obj.querySelector('TextObject StyledText Element String');
    if (strEl) { strEl.textContent = value; }
  }
  return new XMLSerializer().serializeToString(doc);
}

function buildLabelXml(labelXml, item) {
  let xml = labelXml;
  xml = setLabelField(xml, 'barcode', String(item.barcode));
  xml = setLabelField(xml, 'product_title', String(item.title || ''));
  xml = setLabelField(xml, 'sku', String(item.sku || ''));
  xml = setLabelField(xml, 'price', String(item.price || ''));
  return xml;
}

async function renderPreview(labelXml, printerName, index) {
  try {
    const r = await fetch(DYMO_HOST + '/dcd/api/render-label', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        printerName,
        labelXml,
        renderParamsXml: '<LabelWriterRenderParams><SizeMode>FixedSize</SizeMode><Width>560</Width><Height>176</Height><HorizontalResolution>300</HorizontalResolution><VerticalResolution>300</VerticalResolution></LabelWriterRenderParams>',
      }),
    });
    const result = await r.json();
    dbg('render-label', index, result);
    if (result.status && result.responseValue) {
      const el = document.getElementById(`preview-${index}`);
      if (el) el.innerHTML = `<img src="data:image/png;base64,${result.responseValue}" alt="label preview">`;
    }
  } catch(e) {
    dbg('render error', index, e);
    const el = document.getElementById(`preview-${index}`);
    if (el) el.innerHTML = `<span class="pending">Preview unavailable</span>`;
  }
}

window.addEventListener('load', async () => {
  // Step 1: get printers
  let printers = [];
  try {
    const r = await fetch(DYMO_HOST + '/dcd/api/get-printers');
    const json = await r.json();
    dbg('get-printers', json);
    if (json.status && Array.isArray(json.responseValue)) {
      printers = json.responseValue
        .filter(p => p.printerResponse?.isConnected)
        .map(p => p.printerResponse.name);
    }
  } catch(e) {
    statusEl.className = 'error';
    statusEl.textContent = 'Cannot reach DYMO service — see instructions below.';
    certHelp.style.display = 'block';
    dbg('fetch error', e);
    return;
  }

  if (printers.length === 0) {
    statusEl.className = 'error';
    statusEl.textContent = 'No LabelWriter printers found. Make sure DYMO Connect is running and the printer is plugged in.';
    return;
  }

  printerSelect.innerHTML = printers.map(p =>
    `<option value="${esc(p)}">${esc(p)}</option>`).join('');
  printBtn.disabled = items.length === 0;
  statusEl.className = 'ok';
  statusEl.textContent = `Ready — ${items.length} label${items.length === 1 ? '' : 's'} queued`;

  // Step 2: load label template (no-store to always get latest)
  let labelXml;
  try {
    const resp = await fetch('./plaid-room.label', { cache: 'no-store' });
    labelXml = await resp.text();
    dbg('label template loaded', labelXml.length, 'bytes');
  } catch(e) {
    statusEl.className = 'error';
    statusEl.textContent = 'Could not load label template: ' + e.message;
    return;
  }

  // Step 3: render previews using DYMO's actual renderer
  const printerName = printerSelect.value;
  const filledXmls = items.map(item => buildLabelXml(labelXml, item));
  filledXmls.forEach((xml, i) => renderPreview(xml, printerName, i));

  // Re-render previews if printer selection changes
  printerSelect.addEventListener('change', () => {
    const name = printerSelect.value;
    filledXmls.forEach((xml, i) => {
      const el = document.getElementById(`preview-${i}`);
      if (el) el.innerHTML = `<span class="pending">Loading preview…</span>`;
      renderPreview(xml, name, i);
    });
  });

  printBtn.addEventListener('click', async () => {
    printBtn.disabled = true;
    printBtn.textContent = 'Printing…';
    const name = printerSelect.value;
    let printed = 0;
    try {
      for (const xml of filledXmls) {
        const r = await fetch(DYMO_HOST + '/dcd/api/print-label', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            printerName: name,
            printParamsXml: '<LabelWriterPrintParams><Copies>1</Copies></LabelWriterPrintParams>',
            labelXml: xml,
            labelSetXml: '<LabelSet></LabelSet>',
          }),
        });
        const result = await r.json();
        dbg('print result status', result.status);
        if (!result.status) throw new Error(result.error || 'Print failed');
        printed++;
      }
      statusEl.textContent = `✓ Sent ${printed} label${printed === 1 ? '' : 's'} to ${name}`;
      statusEl.className = 'ok';
    } catch(e) {
      statusEl.className = 'error';
      statusEl.textContent = 'Print error: ' + e.message;
    } finally {
      printBtn.disabled = false;
      printBtn.textContent = 'Print All Labels';
    }
  });
});
</script>
</body>
</html>

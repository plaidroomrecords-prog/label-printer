<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plaid Room Records — Print Labels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; font-family: -apple-system, sans-serif; padding: 24px; }
    h1 { font-size: 18px; margin-bottom: 8px; }
    #status { font-size: 13px; margin-bottom: 16px; color: #333; }
    #status.error { color: red; }
    #status.ok { color: #007155; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    select { padding: 8px 12px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; background: white; }
    button { padding: 10px 20px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    #print-btn { background: #000; color: #fff; }
    #print-btn:disabled { background: #999; cursor: not-allowed; }
    #debug { font-size: 11px; color: #888; margin-bottom: 12px; word-break: break-all; white-space: pre-wrap; }
    .label-item { background: white; border: 1px solid #e1e3e5; border-radius: 6px; padding: 10px 14px; font-size: 13px; display: flex; justify-content: space-between; margin-bottom: 6px; }
    .label-item .title { font-weight: 600; }
    .label-item .meta { color: #666; font-size: 12px; }
  </style>
</head>
<body>
<h1>Plaid Room Records — Label Printer</h1>
<div id="status">Connecting to DYMO service…</div>
<div id="debug"></div>
<div class="controls">
  <select id="printer-select"><option>Loading printers…</option></select>
  <button id="print-btn" disabled>Print All Labels</button>
</div>
<div id="label-list"></div>

<script>
const DYMO_HOST = '';
const statusEl = document.getElementById('status');
const debugEl  = document.getElementById('debug');
const printerSelect = document.getElementById('printer-select');
const printBtn = document.getElementById('print-btn');

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dbg(msg) { debugEl.textContent += msg + '\n'; }

// Parse labels from URL
const params = new URLSearchParams(window.location.search);
let items = [];
try { items = JSON.parse(decodeURIComponent(params.get('labels') || '[]')); } catch(e) {}

document.getElementById('label-list').innerHTML = items.map(item => `
  <div class="label-item">
    <div><div class="title">${esc(item.title)}</div><div class="meta">${esc(item.sku)} · ${esc(item.barcode)}</div></div>
    <div style="font-size:16px;font-weight:700;">${esc(item.price)}</div>
  </div>`).join('');

async function dymoGet(path) {
  const r = await fetch(DYMO_HOST + path, {
    method: 'GET',
    headers: { 'Content-Type': 'text/xml' },
  });
  return r.text();
}

async function dymoPost(path, bodyParams) {
  const body = new URLSearchParams(bodyParams);
  const r = await fetch(DYMO_HOST + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString(),
  });
  return r.text();
}

// Parse printer names from DYMO XML response
function parsePrinters(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  return Array.from(doc.querySelectorAll('LabelWriterPrinter')).map(p => ({
    name: p.querySelector('Name')?.textContent || '',
    type: 'LabelWriterPrinter',
  }));
}

// Set a variable field value in the label XML string
function setLabelField(xml, fieldName, value) {
  // Replace the variable object's text node
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const objs = doc.querySelectorAll('ObjectInfo');
  for (const obj of objs) {
    const nameEl = obj.querySelector('Name');
    if (!nameEl || nameEl.textContent !== fieldName) continue;
    // Barcode object
    const textEl = obj.querySelector('BarcodeObject > Text');
    if (textEl) { textEl.textContent = value; continue; }
    // Text object
    const strEl = obj.querySelector('TextObject StyledText Element String');
    if (strEl) { strEl.textContent = value; }
  }
  return new XMLSerializer().serializeToString(doc);
}

window.addEventListener('load', async () => {
  // Step 1: get printers
  let printersXml;
  try {
    printersXml = await dymoGet('/dymo-api/DYMO/DLS/Printing/GetPrinters');
    dbg('GetPrinters response length: ' + printersXml.length);
    dbg(printersXml.slice(0, 500));
  } catch(e) {
    statusEl.className = 'error';
    statusEl.textContent = 'Cannot reach DYMO service at port 41951: ' + e.message;
    dbg('fetch error: ' + e);
    return;
  }

  const printers = parsePrinters(printersXml);
  dbg('Parsed printers: ' + JSON.stringify(printers));

  if (printers.length === 0) {
    statusEl.className = 'error';
    statusEl.textContent = 'No LabelWriter printers found. See debug info below.';
    return;
  }

  printerSelect.innerHTML = printers.map(p =>
    `<option value="${esc(p.name)}">${esc(p.name)}</option>`).join('');
  printBtn.disabled = items.length === 0;
  statusEl.className = 'ok';
  statusEl.textContent = `Ready — ${items.length} label${items.length === 1 ? '' : 's'} queued`;

  // Step 2: load label template
  let labelXml;
  try {
    const resp = await fetch('./plaid-room.label');
    labelXml = await resp.text();
    dbg('Label template loaded: ' + labelXml.length + ' bytes');
  } catch(e) {
    statusEl.className = 'error';
    statusEl.textContent = 'Could not load plaid-room.label: ' + e.message;
    return;
  }

  printBtn.addEventListener('click', async () => {
    const printerName = printerSelect.value;
    printBtn.disabled = true;
    printBtn.textContent = 'Printing…';
    try {
      for (const item of items) {
        let xml = labelXml;
        xml = setLabelField(xml, 'barcode', String(item.barcode));
        xml = setLabelField(xml, 'product_title', String(item.title || ''));
        xml = setLabelField(xml, 'sku', String(item.sku || ''));
        xml = setLabelField(xml, 'price', String(item.price || ''));
        const result = await dymoPost('/dymo-api/DYMO/DLS/Printing/PrintLabel', {
          printerName,
          printParamsXml: '<LabelWriterPrintParams><Copies>1</Copies></LabelWriterPrintParams>',
          labelXml: xml,
          labelSetXml: '<LabelSet></LabelSet>',
        });
        dbg('Print result: ' + result);
      }
      statusEl.textContent = `✓ Sent ${items.length} label${items.length === 1 ? '' : 's'} to ${printerName}`;
      statusEl.className = 'ok';
    } catch(e) {
      statusEl.className = 'error';
      statusEl.textContent = 'Print error: ' + e.message;
    } finally {
      printBtn.disabled = false;
      printBtn.textContent = 'Print All Labels';
    }
  });
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plaid Room Records — Print Labels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; font-family: Futura, 'Century Gothic', 'Trebuchet MS', sans-serif; padding: 20px; }
    h1 { font-size: 18px; margin-bottom: 8px; }
    #status { font-size: 13px; color: #333; margin-bottom: 8px; }
    #status.error { color: red; }
    #status.ok { color: #007155; }
    #cert-help {
      display: none; font-size: 13px; margin-bottom: 16px;
      background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 10px 14px;
      line-height: 1.8;
    }
    #cert-help a { color: #007155; font-weight: 600; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 12px 0 20px; }
    select { padding: 8px 12px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; background: white; }
    button { padding: 10px 20px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    #print-btn { background: #000; color: #fff; }
    #print-btn:disabled { background: #999; cursor: not-allowed; }

    .label {
      width: 3.5in;
      height: 1.125in;
      background: white;
      border: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      padding: 0.12in 0.23in 0.10in 0.23in;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .label-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-shrink: 0;
    }
    .label-text-block { flex: 1; min-width: 0; padding-right: 4px; }
    .label-title {
      font-size: 8.5pt;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }
    .label-sku {
      font-size: 6.5pt;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
      margin-top: 1px;
    }
    .label-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: auto;
    }
    .label-barcode-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-left: 0.18in;
    }
    .label-barcode-area img { display: block; }
    .label-barcode-number {
      font-size: 6pt;
      margin-top: 1px;
      text-align: center;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .label-right {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-bottom: 2px;
      flex-shrink: 0;
    }
    .label-logo {
      width: 0.52in;
      height: 0.52in;
      object-fit: contain;
    }
    .label-price {
      font-size: 15pt;
      font-weight: normal;
      text-align: right;
      line-height: 1;
    }
  </style>
</head>
<body>
<h1>Plaid Room Records — Label Printer <span style="font-size:11px;color:#999;float:right;">v13</span></h1>
<div id="status">Connecting to DYMO service…</div>
<div id="cert-help">
  ⚠️ Cannot reach the DYMO service. Make sure:<br>
  1. <strong>DYMO Connect</strong> is installed and open<br>
  2. Your LabelWriter is plugged in via USB<br>
  3. If on a new computer, <a href="http://127.0.0.1:41951" target="_blank">click here</a> to confirm the service is running
</div>
<div class="controls">
  <select id="printer-select"><option>Loading printers…</option></select>
  <button id="print-btn" disabled>Print All Labels</button>
</div>
<div id="label-list"></div>

<script>
const DYMO_HOST = 'http://127.0.0.1:41951';
const DEBUG = new URLSearchParams(window.location.search).has('debug');
const statusEl = document.getElementById('status');
const certHelp = document.getElementById('cert-help');
const printerSelect = document.getElementById('printer-select');
const printBtn = document.getElementById('print-btn');

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dbg(...args) { if (DEBUG) console.log('[label-printer]', ...args); }

// --- Code128B barcode encoder (no external dependency) ---
const CODE128B_PATTERNS = [
  0b11011001100,0b11001101100,0b11001100110,0b10010011000,
  0b10010001100,0b10001001100,0b10011001000,0b10011000100,
  0b10001100100,0b11001001000,0b11001000100,0b11000100100,
  0b10110011100,0b10011011100,0b10011001110,0b10111001100,
  0b10011101100,0b10011100110,0b11001110010,0b11001011100,
  0b11001001110,0b11011100100,0b11001110100,0b11101101110,
  0b11101001100,0b11100101100,0b11100100110,0b11101100100,
  0b11100110100,0b11100110010,0b11011011000,0b11011000110,
  0b11000110110,0b10100011000,0b10001011000,0b10001000110,
  0b10110001000,0b10001101000,0b10001100010,0b11010001000,
  0b11000101000,0b11000100010,0b10110111000,0b10110001110,
  0b10001101110,0b10111011000,0b10111000110,0b10001110110,
  0b11101110110,0b11010001110,0b11000101110,0b11011101000,
  0b11011100010,0b11011101110,0b11101011000,0b11101000110,
  0b11100010110,0b11101101000,0b11101100010,0b11100011010,
  0b11101111010,0b11001000010,0b11110001010,0b10100110000,
  0b10100001100,0b10010110000,0b10010000110,0b10000101100,
  0b10000100110,0b10110010000,0b10110000100,0b10011010000,
  0b10011000010,0b10000110100,0b10000110010,0b11000010010,
  0b11001010000,0b11110111010,0b11000010100,0b10001111010,
  0b10100111100,0b10010111100,0b10010011110,0b10111100100,
  0b10011110100,0b10011110010,0b11110100100,0b11110010100,
  0b11110010010,0b11011011110,0b11011110110,0b11110110110,
  0b10101111000,0b10100011110,0b10001011110,
];
const START_B  = 0b11010010000;
const STOP_PAT = 0b1100011101011;

function encodeCode128B(text) {
  const chars = [];
  for (let i = 0; i < text.length; i++) {
    const c = text.charCodeAt(i);
    if (c < 32 || c > 126) return null;
    chars.push(c - 32);
  }
  let check = 104;
  for (let i = 0; i < chars.length; i++) check += chars[i] * (i + 1);
  check %= 103;
  const syms = [START_B, ...chars.map(c => CODE128B_PATTERNS[c]), CODE128B_PATTERNS[check]];
  const bars = [];
  for (const s of syms) for (let b = 10; b >= 0; b--) bars.push((s >> b) & 1);
  for (let b = 12; b >= 0; b--) bars.push((STOP_PAT >> b) & 1);
  bars.push(1); bars.push(1);
  return bars;
}

function buildBarcodeDataURL(text, widthPx, heightPx) {
  const bars = encodeCode128B(text);
  if (!bars) return null;
  const canvas = document.createElement('canvas');
  const scale = 3;
  canvas.width = widthPx * scale;
  canvas.height = heightPx * scale;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'black';
  const barWidth = (widthPx * scale) / bars.length;
  for (let i = 0; i < bars.length; i++) {
    if (bars[i]) {
      const x = Math.round(i * barWidth);
      const nextX = Math.round((i + 1) * barWidth);
      ctx.fillRect(x, 0, nextX - x, canvas.height);
    }
  }
  return canvas.toDataURL('image/png');
}

// --- Label HTML rendering ---
function renderLabel(item) {
  const barcodeDataURL = buildBarcodeDataURL(item.barcode, 125, 26);
  const barcodeImg = barcodeDataURL
    ? `<img src="${barcodeDataURL}" width="125" height="26" style="display:block;image-rendering:pixelated;">`
    : '';
  return `
    <div class="label">
      <div class="label-top">
        <div class="label-text-block">
          <div class="label-title">${esc(item.title || '')}</div>
          <div class="label-sku">${esc(item.sku || '')}</div>
        </div>
      </div>
      <div class="label-bottom">
        <div class="label-barcode-area">
          ${barcodeImg}
          <div class="label-barcode-number">${esc(item.barcode.toUpperCase())}</div>
        </div>
        <div class="label-right">
          <img class="label-logo" src="./logo.png" alt="Plaid Room Records">
          <div class="label-price">${esc(item.price || '')}</div>
        </div>
      </div>
    </div>`;
}

// Support both hash (#labels=...) and query (?labels=...) — hash avoids server URL length limits
let items = [];
try {
  const hash = window.location.hash.slice(1);
  const query = window.location.search.slice(1);
  const raw = new URLSearchParams(hash).get('labels') || new URLSearchParams(query).get('labels') || '[]';
  items = JSON.parse(decodeURIComponent(raw));
} catch(e) {}

document.getElementById('label-list').innerHTML = items.map(renderLabel).join('');

// --- DYMO Connect printing ---
function setLabelField(xml, fieldName, value) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  for (const obj of doc.querySelectorAll('ObjectInfo')) {
    const nameEl = obj.querySelector('Name');
    if (!nameEl || nameEl.textContent !== fieldName) continue;
    const textEl = obj.querySelector('BarcodeObject > Text');
    if (textEl) { textEl.textContent = value; continue; }
    const strEl = obj.querySelector('TextObject StyledText Element String');
    if (strEl) { strEl.textContent = value; }
  }
  return new XMLSerializer().serializeToString(doc);
}

function buildLabelXml(labelXml, item) {
  let xml = labelXml;
  xml = setLabelField(xml, 'barcode', String(item.barcode));
  xml = setLabelField(xml, 'product_title', String(item.title || ''));
  xml = setLabelField(xml, 'sku', String(item.sku || ''));
  xml = setLabelField(xml, 'price', String(item.price || ''));
  return xml;
}

window.addEventListener('load', async () => {
  let printers = [];
  try {
    const r = await fetch(DYMO_HOST + '/dcd/api/get-printers');
    const json = await r.json();
    dbg('get-printers', json);
    if (json.status && Array.isArray(json.responseValue)) {
      printers = json.responseValue
        .filter(p => p.printerResponse?.isConnected)
        .map(p => p.printerResponse.name);
    }
  } catch(e) {
    statusEl.className = 'error';
    statusEl.textContent = 'Cannot reach DYMO service — see instructions below.';
    certHelp.style.display = 'block';
    dbg('fetch error', e);
    return;
  }

  if (printers.length === 0) {
    statusEl.className = 'error';
    statusEl.textContent = 'No LabelWriter printers found. Make sure DYMO Connect is running and the printer is plugged in.';
    return;
  }

  printerSelect.innerHTML = printers.map(p =>
    `<option value="${esc(p)}">${esc(p)}</option>`).join('');
  printBtn.disabled = items.length === 0;
  statusEl.className = 'ok';
  statusEl.textContent = `Ready — ${items.length} label${items.length === 1 ? '' : 's'} queued`;

  let labelXml;
  try {
    const resp = await fetch('./plaid-room.label', { cache: 'no-store' });
    labelXml = await resp.text();
    dbg('label template loaded', labelXml.length, 'bytes');
  } catch(e) {
    statusEl.className = 'error';
    statusEl.textContent = 'Could not load label template: ' + e.message;
    return;
  }

  // Use first label as the template; encode remaining as LabelSet records
  // so the entire batch is one print job (no hiccup between labels)
  const firstXml = buildLabelXml(labelXml, items[0]);
  const labelSetXml = items.length <= 1 ? '<LabelSet></LabelSet>' : [
    '<LabelSet>',
    ...items.slice(1).map(item => `
      <LabelRecord>
        <ObjectData Name="barcode"><![CDATA[${item.barcode}]]></ObjectData>
        <ObjectData Name="product_title"><![CDATA[${item.title || ''}]]></ObjectData>
        <ObjectData Name="sku"><![CDATA[${item.sku || ''}]]></ObjectData>
        <ObjectData Name="price"><![CDATA[${item.price || ''}]]></ObjectData>
      </LabelRecord>`),
    '</LabelSet>',
  ].join('');

  printBtn.addEventListener('click', async () => {
    printBtn.disabled = true;
    printBtn.textContent = 'Printing…';
    const name = printerSelect.value;
    try {
      const r = await fetch(DYMO_HOST + '/dcd/api/print-label', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          printerName: name,
          printParamsXml: '<LabelWriterPrintParams><Copies>1</Copies></LabelWriterPrintParams>',
          labelXml: firstXml,
          labelSetXml,
        }),
      });
      const result = await r.json();
      dbg('print result', result);
      if (!result.status) throw new Error(result.error || 'Print failed');
      statusEl.textContent = `✓ Sent ${items.length} label${items.length === 1 ? '' : 's'} to ${name}`;
      statusEl.className = 'ok';
    } catch(e) {
      statusEl.className = 'error';
      statusEl.textContent = 'Print error: ' + e.message;
    } finally {
      printBtn.disabled = false;
      printBtn.textContent = 'Print All Labels';
    }
  });
});
</script>
</body>
</html>

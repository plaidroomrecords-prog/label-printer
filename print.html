<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plaid Room Records — Print Labels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; font-family: Futura, 'Century Gothic', 'Trebuchet MS', sans-serif; }

    #screen-ui { padding: 20px; }
    #screen-ui h1 { font-size: 18px; margin-bottom: 8px; }
    #screen-ui p { font-size: 13px; color: #555; margin-bottom: 16px; }
    #print-btn {
      padding: 10px 20px; background: #000; color: #fff;
      border: none; font-size: 14px; cursor: pointer; border-radius: 4px;
    }
    #error-msg { color: red; font-size: 13px; margin-top: 12px; }

    .labels-wrapper { margin-top: 24px; }

    .label {
      width: 3.5in;
      height: 1.125in;
      background: white;
      border: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      padding: 0.05in 0.07in 0.04in 0.07in;
      margin-bottom: 12px;
      overflow: hidden;
      position: relative;
    }

    .label-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-shrink: 0;
    }
    .label-text-block { flex: 1; min-width: 0; padding-right: 4px; }
    .label-title {
      font-size: 8.5pt;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }
    .label-sku {
      font-size: 6.5pt;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
      margin-top: 1px;
    }
    .label-logo {
      width: 0.52in;
      height: 0.52in;
      object-fit: contain;
      flex-shrink: 0;
    }

    .label-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: auto;
    }
    .label-barcode-area {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .label-barcode-area svg { display: block; }
    .label-barcode-number {
      font-size: 6pt;
      margin-top: 1px;
      text-align: center;
      letter-spacing: 0.5px;
    }
    .label-price {
      font-size: 15pt;
      font-weight: bold;
      text-align: right;
      line-height: 1;
      padding-bottom: 2px;
    }

    @media print {
      @page { size: 3.5in 1.125in; margin: 0; }
      body { background: white; }
      #screen-ui { display: none; }
      .labels-wrapper { margin: 0; }
      .label {
        border: none;
        margin: 0;
        page-break-after: always;
        break-after: page;
        width: 3.5in;
        height: 1.125in;
      }
    }
  </style>
</head>
<body>

<div id="screen-ui">
  <h1>Plaid Room Records — Label Printer</h1>
  <p id="label-count">Loading labels…</p>
  <button id="print-btn" onclick="window.print()">Print Labels</button>
  <div id="error-msg"></div>
</div>

<div class="labels-wrapper" id="labels-wrapper"></div>

<script>
// ── Code128B encoder ──────────────────────────────────────────────────────────
const CODE128_START_B = 104;
const CODE128_STOP    = 106;

// Each value is an 11-bit pattern (MSB first) for Code128 B.
// Index 0 = space (ASCII 32), index 95 = tilde (ASCII 126).
const CODE128B_PATTERNS = [
  0b11011001100, 0b11001101100, 0b11001100110, 0b10010011000,
  0b10010001100, 0b10001001100, 0b10011001000, 0b10011000100,
  0b10001100100, 0b11001001000, 0b11001000100, 0b11000100100,
  0b10110011100, 0b10011011100, 0b10011001110, 0b10111001100,
  0b10011101100, 0b10011100110, 0b11001110010, 0b11001011100,
  0b11001001110, 0b11011100100, 0b11001110100, 0b11101101110,
  0b11101001100, 0b11100101100, 0b11100100110, 0b11101100100,
  0b11100110100, 0b11100110010, 0b11011011000, 0b11011000110,
  0b11000110110, 0b10100011000, 0b10001011000, 0b10001000110,
  0b10110001000, 0b10001101000, 0b10001100010, 0b11010001000,
  0b11000101000, 0b11000100010, 0b10110111000, 0b10110001110,
  0b10001101110, 0b10111011000, 0b10111000110, 0b10001110110,
  0b11101110110, 0b11010001110, 0b11000101110, 0b11011101000,
  0b11011100010, 0b11011101110, 0b11101011000, 0b11101000110,
  0b11100010110, 0b11101101000, 0b11101100010, 0b11100011010,
  0b11101111010, 0b11001000010, 0b11110001010, 0b10100110000,
  0b10100001100, 0b10010110000, 0b10010000110, 0b10000101100,
  0b10000100110, 0b10110010000, 0b10110000100, 0b10011010000,
  0b10011000010, 0b10000110100, 0b10000110010, 0b11000010010,
  0b11001010000, 0b11110111010, 0b11000010100, 0b10001111010,
  0b10100111100, 0b10010111100, 0b10010011110, 0b10111100100,
  0b10011110100, 0b10011110010, 0b11110100100, 0b11110010100,
  0b11110010010, 0b11011011110, 0b11011110110, 0b11110110110,
  0b10101111000, 0b10100011110, 0b10001011110,
];

// Stop pattern (special 13-bit)
const STOP_PATTERN = 0b1100011101011;
const STOP_BITS    = 13;

// Start B pattern (same table, index 104 — but we use the value directly)
const START_B_PATTERN = 0b11010010000; // Code128 Start B

function encodeCode128B(text) {
  const chars = [];
  for (let i = 0; i < text.length; i++) {
    const code = text.charCodeAt(i);
    if (code < 32 || code > 126) return null; // unsupported char
    chars.push(code - 32); // index into CODE128B_PATTERNS
  }

  // Check digit
  let checksum = CODE128_START_B; // 104
  for (let i = 0; i < chars.length; i++) {
    checksum += chars[i] * (i + 1);
  }
  checksum = checksum % 103;

  // Build bar sequence: each symbol is 11 bits, stop is 13 bits
  const symbols = [START_B_PATTERN, ...chars.map(c => CODE128B_PATTERNS[c]), CODE128B_PATTERNS[checksum]];

  // Convert to bar widths
  const bars = []; // alternating bar/space widths, starting with bar
  for (const sym of symbols) {
    for (let bit = 10; bit >= 0; bit--) {
      bars.push((sym >> bit) & 1);
    }
  }
  // Stop symbol (13 bits)
  for (let bit = 12; bit >= 0; bit--) {
    bars.push((STOP_PATTERN >> bit) & 1);
  }
  // Final termination bar (2 modules)
  bars.push(1); bars.push(1);

  return bars;
}

function buildBarcodeSVG(text, widthPx, heightPx) {
  const bars = encodeCode128B(text);
  if (!bars) return '<svg></svg>';

  const totalModules = bars.length;
  const moduleWidth  = widthPx / totalModules;

  let rects = '';
  let x = 0;
  for (let i = 0; i < bars.length; i++) {
    const w = moduleWidth;
    if (bars[i] === 1) {
      rects += `<rect x="${x.toFixed(3)}" y="0" width="${w.toFixed(3)}" height="${heightPx}" fill="black"/>`;
    }
    x += w;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${widthPx}" height="${heightPx}" viewBox="0 0 ${widthPx} ${heightPx}">${rects}</svg>`;
}

// ── Label rendering ───────────────────────────────────────────────────────────
const LOGO_URL = 'https://shopify-staged-uploads.storage.googleapis.com/tmp/14874550/files/198e70fd-66b1-4e28-a48b-6a13ebd1d515/PRRLogos-03.png';

function renderLabel(item) {
  const barcodeSVG = buildBarcodeSVG(item.barcode, 144, 36); // ~1.5in × 0.375in at 96dpi
  const price = item.price || '';
  const title = (item.title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const sku   = (item.sku   || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const barcodeDisplay = item.barcode.replace(/</g, '&lt;');

  return `
    <div class="label">
      <div class="label-top">
        <div class="label-text-block">
          <div class="label-title">${title}</div>
          <div class="label-sku">${sku}</div>
        </div>
        <img class="label-logo" src="${LOGO_URL}" alt="Plaid Room Records">
      </div>
      <div class="label-bottom">
        <div class="label-barcode-area">
          ${barcodeSVG}
          <div class="label-barcode-number">${barcodeDisplay}</div>
        </div>
        <div class="label-price">${price}</div>
      </div>
    </div>`;
}

// ── Main ──────────────────────────────────────────────────────────────────────
(function () {
  const params = new URLSearchParams(window.location.search);
  const raw    = params.get('labels');
  const errorEl = document.getElementById('error-msg');
  const countEl = document.getElementById('label-count');
  const wrapper = document.getElementById('labels-wrapper');

  if (!raw) {
    errorEl.textContent = 'No label data found in URL. Open this page from the Barcode Reprint tab in Plaid Room Utilities.';
    countEl.textContent = '0 labels';
    return;
  }

  let items;
  try {
    items = JSON.parse(decodeURIComponent(raw));
  } catch (e) {
    errorEl.textContent = 'Could not parse label data: ' + e.message;
    countEl.textContent = '0 labels';
    return;
  }

  if (!Array.isArray(items) || items.length === 0) {
    errorEl.textContent = 'No labels to print.';
    countEl.textContent = '0 labels';
    return;
  }

  countEl.textContent = `${items.length} label${items.length === 1 ? '' : 's'} ready — click Print Labels or use Ctrl+P / Cmd+P`;
  wrapper.innerHTML = items.map(renderLabel).join('');
})();
</script>
</body>
</html>
